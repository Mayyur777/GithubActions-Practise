name: pylint

on:
  push:
    branches: [main]
    paths: "*.py"

jobs:
    code:
      runs-on: ubuntu-22.04
      steps:
        - name: Checkout code
          uses: actions/checkout@v7

        - name: Install Python linter
          run: pip install ruff

        - name: Run ruff
          run: pip install ruff
        
  
